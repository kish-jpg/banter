name: CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: macos-26
    env:
      SIMULATOR_DESTINATION: "platform=iOS Simulator,name=iPhone 17"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install XcodeGen
        run: brew install xcodegen@2.45.4

      - name: Generate project
        run: xcodegen generate

      - name: Assert App Group entitlement survived generation
        run: |
          for f in BanterApp/BanterApp.entitlements BanterKeyboard/BanterKeyboard.entitlements; do
            if ! grep -q 'group.com.banter.shared' "$f"; then
              echo "::error::App Group entitlement missing from $f after xcodegen generate"
              exit 1
            fi
          done
          # Source-file grep above only catches the checked-in plist being
          # edited directly. The real schema-drift threat (T-01-11) is
          # XcodeGen's project.yml -> project.pbxproj wiring silently
          # dropping the CODE_SIGN_ENTITLEMENTS build setting, so assert
          # against the generated artifact too (grep -E to tolerate
          # optional quoting around the path that XcodeGen may emit).
          if ! grep -Eq 'CODE_SIGN_ENTITLEMENTS = "?BanterApp/BanterApp\.entitlements"?;' Banter.xcodeproj/project.pbxproj; then
            echo "::error::CODE_SIGN_ENTITLEMENTS missing/wrong for BanterApp in generated project.pbxproj"
            exit 1
          fi
          if ! grep -Eq 'CODE_SIGN_ENTITLEMENTS = "?BanterKeyboard/BanterKeyboard\.entitlements"?;' Banter.xcodeproj/project.pbxproj; then
            echo "::error::CODE_SIGN_ENTITLEMENTS missing/wrong for BanterKeyboard in generated project.pbxproj"
            exit 1
          fi

      - name: Build BanterApp (simulator)
        run: |
          xcodebuild build \
            -project Banter.xcodeproj \
            -scheme BanterApp \
            -destination "$SIMULATOR_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Test BanterShared
        run: swift test --package-path BanterShared

      - name: Build BanterKeyboard (simulator)
        run: |
          xcodebuild build \
            -project Banter.xcodeproj \
            -scheme BanterKeyboard \
            -destination "$SIMULATOR_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO
