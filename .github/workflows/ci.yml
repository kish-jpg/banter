name: CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: macos-26
    env:
      SIMULATOR_DESTINATION: "platform=iOS Simulator,name=iPhone 17"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install XcodeGen
        run: |
          # Homebrew core has no versioned "xcodegen@2.45.4" formula alias
          # (confirmed: `brew install xcodegen@2.45.4` errors "no available
          # formula"). Install the unversioned formula, then assert the
          # resolved version matches the pinned one so an unexpected
          # XcodeGen upgrade fails loudly instead of silently drifting
          # (STRIDE T-01-11).
          brew install xcodegen
          installed_version="$(xcodegen version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          if [ "$installed_version" != "2.45.4" ]; then
            echo "::error::Expected XcodeGen 2.45.4, Homebrew installed $installed_version — re-pin deliberately"
            exit 1
          fi

      - name: Generate project
        run: xcodegen generate

      - name: Assert App Group entitlement survived generation
        run: |
          for f in BanterApp/BanterApp.entitlements BanterKeyboard/BanterKeyboard.entitlements; do
            if ! grep -q 'group.com.banter.shared' "$f"; then
              echo "::error::App Group entitlement missing from $f after xcodegen generate"
              exit 1
            fi
          done
          # Source-file grep above only catches the checked-in plist being
          # edited directly. The real schema-drift threat (T-01-11) is
          # XcodeGen's project.yml -> project.pbxproj wiring silently
          # dropping the CODE_SIGN_ENTITLEMENTS build setting, so assert
          # against the generated artifact too (grep -E to tolerate
          # optional quoting around the path that XcodeGen may emit).
          if ! grep -Eq 'CODE_SIGN_ENTITLEMENTS = "?BanterApp/BanterApp\.entitlements"?;' Banter.xcodeproj/project.pbxproj; then
            echo "::error::CODE_SIGN_ENTITLEMENTS missing/wrong for BanterApp in generated project.pbxproj"
            exit 1
          fi
          if ! grep -Eq 'CODE_SIGN_ENTITLEMENTS = "?BanterKeyboard/BanterKeyboard\.entitlements"?;' Banter.xcodeproj/project.pbxproj; then
            echo "::error::CODE_SIGN_ENTITLEMENTS missing/wrong for BanterKeyboard in generated project.pbxproj"
            exit 1
          fi

      # BanterKeyboard is an embedded dependency of BanterApp (project.yml),
      # so this single scheme build compiles the keyboard extension too — no
      # separate BanterKeyboard scheme exists (XcodeGen only generates
      # declared schemes; a headless build of an undeclared scheme fails).
      - name: Build BanterApp + embedded BanterKeyboard (simulator)
        run: |
          xcodebuild build \
            -project Banter.xcodeproj \
            -scheme BanterApp \
            -destination "$SIMULATOR_DESTINATION" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      # Browser-testable simulator bundle (Appetize.io accepts a zipped
      # simulator .app). Reuses the build above via the pinned DerivedData.
      - name: Package simulator app (Appetize)
        run: |
          cd DerivedData/Build/Products/Debug-iphonesimulator
          zip -qry "$GITHUB_WORKSPACE/BanterApp-simulator.zip" BanterApp.app

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: banter-simulator-app
          path: BanterApp-simulator.zip
          retention-days: 14

      # Unsigned device build for AltStore/SideStore sideloading (free Apple
      # ID re-signs on install — no Developer Program needed). Debug config:
      # same settings already proven green on simulator.
      - name: Build unsigned device IPA (AltStore sideload)
        run: |
          xcodebuild build \
            -project Banter.xcodeproj \
            -scheme BanterApp \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -R DerivedData/Build/Products/Debug-iphoneos/BanterApp.app Payload/
          zip -qry BanterApp-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: banter-unsigned-ipa
          path: BanterApp-unsigned.ipa
          retention-days: 14

      - name: Test BanterShared
        run: swift test --package-path BanterShared

      - name: Run UI screenshot tests
        run: |
          xcodebuild test \
            -project Banter.xcodeproj \
            -scheme BanterApp \
            -destination "$SIMULATOR_DESTINATION" \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            -only-testing:BanterUITests \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: TestResults.xcresult
          retention-days: 14

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.1"

      - name: Sync shared fixture (Deno<->Swift drift guard)
        run: bash Backend/scripts/sync-fixture.sh

      - name: Taxonomy drift guard (backend<->client byte-identical, COAC-04)
        run: bash Backend/scripts/sync-taxonomy.sh --check

      - name: Run Deno test suite (mocked Gemini, no docker/live API)
        run: deno test Backend/ --allow-env --allow-read
