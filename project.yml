name: Banter
options:
  bundleIdPrefix: com.banter
packages:
  BanterShared:
    path: BanterShared
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: "5.80.2"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.66.1"
targets:
  BanterApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: BanterApp
    dependencies:
      - package: BanterShared
      - package: RevenueCat
        product: RevenueCat
      - package: PostHog
      # Embeds the .appex into the app bundle — without this the keyboard
      # never appears in Settings > Keyboards on any device (CR-02).
      - target: BanterKeyboard
    entitlements:
      path: BanterApp/BanterApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.banter.shared
    info:
      path: BanterApp/Info.plist
  BanterKeyboard:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      # App Store validation requires the extension's bundle ID to be
      # prefixed by the containing app's (com.banter.BanterApp), not the
      # XcodeGen default com.banter.BanterKeyboard. Must stay in sync with
      # HomeView.keyboardExtensionBundleID.
      PRODUCT_BUNDLE_IDENTIFIER: com.banter.BanterApp.BanterKeyboard
    sources:
      - path: BanterKeyboard
      # Banter.* tokens resolve colors via Color(..., bundle: .main), so the
      # extension must compile BOTH the tokens source and its own copy of the
      # color catalog (CI fix: "cannot find 'Banter' in scope").
      - path: BanterApp/DesignSystem/BanterTokens.swift
      - path: BanterApp/DesignSystem/Assets.xcassets
    dependencies:
      - package: BanterShared
    entitlements:
      path: BanterKeyboard/BanterKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.banter.shared
    info:
      path: BanterKeyboard/Info.plist
      # XcodeGen REGENERATES this plist on every `xcodegen generate` — the
      # NSExtension dict must live here or CI wipes it and the embedded
      # .appex fails simulator install ("extensionDictionary must be set").
      properties:
        # Name shown in Settings > General > Keyboard > Keyboards; installd
        # rejects an appex without a non-empty CFBundleDisplayName.
        CFBundleDisplayName: Banter
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: false
  BanterUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: BanterUITests
    dependencies:
      - target: BanterApp

schemes:
  BanterApp:
    build:
      targets:
        BanterApp: all
    test:
      targets:
        - BanterUITests
